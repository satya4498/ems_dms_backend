<!DOCTYPE html>
<html lang="en">

<head>
  <title>Verify Email</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Jura:wght@500&family=Roboto:wght@100;300;400;500;700;900&family=Style+Script&display=swap">
  <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
  </style>
</head>

<body>
  <table border="0"
    style="width: 600px; background-color: #0B195C; font-family: 'Roboto', sans-serif; color: #ffffff; line-height: 1.4; margin: 15px auto;">
    <tbody>
      <tr>
        <td style="padding: 20px;">
          <img src={{{siteLogo}}} style="width: 100px; display: block; margin: auto;" alt="img">
        </td>
      </tr>
      <tr>
        <td style="text-align: center;">
          <img
            src="https://gammastack-casino.s3.amazonaws.com/staging/superadmin_gallery_image_izuusvodrhn-1679659786205.jpeg"
            style="display: block; margin: auto;" alt="img">
        </td>
      </tr>
      <tr>
        <td style="text-align: center;">
          <div style="min-height: 330px;  align-items: center;  padding: 20px;">
            <h6
              style="font-size: 28px; font-weight: 900; letter-spacing: 1.5px; text-align: center; margin-bottom: 35px;">
              <span style="color: #ffffff; display: block;">You nearly There!</span>
            </h6>
            <p style="color: #ffffff; font-size: 15px; font-weight: 400; letter-spacing: 1.5px; margin-bottom: 35px;">We
              just need to verify your email address to<br> complete your Satyam Casino signup.</p>
            <button type="button"
              style="min-width: 275px; background-color: transparent; border: 3px solid #ffffff; border-radius: 36px; color: #ffffff; font-size: 22px; font-weight: 700; letter-spacing: .5px; cursor: pointer; padding: 12px 30px;"><a
                href={{{link}}} style="color: #ffffff; text-decoration: none;"> Verify Email Address</button>
            <p style="color: #ffffff; font-size: 10px; font-weight: 400; letter-spacing: 1.5px; margin-top: 35px;">
              Please note that this link will expire in 5 days, if you have not<br> signed up to Satyam Casino,
              please ignore this email. Thanks.</p>
          </div>
        </td>
      </tr>
      <tr>
        <td style="text-align: center; padding: 15px 20px 15px;">
          <p style="color: #ffffff; font-size: 15px; font-weight: 900; letter-spacing: .5px; text-align: center;">@2023
            {{{siteName}}}</p>
        </td>
      </tr>
    </tbody>
  </table>
</body>

</html>

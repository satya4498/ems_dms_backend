<!DOCTYPE html>
<html lang="en">

<head>
  <title>Gambling Issues Registration</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Jura:wght@500&family=Roboto:wght@100;300;400;500;700;900&family=Style+Script&display=swap">
  <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
  </style>
</head>

<body>
  <div
    style="width: 600px; background-color: #f7f9fa; font-family: 'Roboto', sans-serif; color: #ffffff; line-height: 1.4; margin: 15px auto;">
    <table border="0"
      style="width: 600px; background-color: #141432; border-width: 10px; border-style: solid; border-image-slice: 1; border-image-source: linear-gradient(135deg, #5037CD, #FE88FF);">
      <tbody>
        <tr>
          <td style="padding: 16px;">
            <h1
              style="background: linear-gradient(135deg, #5037CD, #FE88FF); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 30px; text-align: center;">
              Satyam Casino</h1>
          </td>
        </tr>
        <tr>
          <td style="background-color: #2c2b69; padding: 24px;">
            <div style="display: flex; margin-bottom: 32px;">
              <p style="color: #ffffff; font-size: 16px; font-weight: 300; margin-left: 10px;">You can contact us for
                any gambling issue, we will try to resolve it as soon as possible.</p>
            </div>
            <p style="color: #ffffff; font-size: 16px; font-weight: 300; margin-bottom: 16px;">Support Email Address -
              <span style="color: #57D08A; font-weight: bold;">{{{supportEmailAddress}}}</span>
            </p>
            <div style="padding-top: 16px;">
              <a href="{{{sendSupportRequestRoute}}}"
                style="background: linear-gradient(135deg, #5037CD, #FE88FF); border-radius: 8px; color: #ffffff; font-size: 15px; text-align: center; text-decoration: none; display: block; padding: 10px 20px;">Compose
                & Send Mail</a>
            </div>
          </td>
        </tr>
        <tr>
          <td style="padding: 16px;">
            <p style="color: #605f9c; font-size: 12px; text-align: center;">© Copyright 2022</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <title>Joining Bonus</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Jura:wght@500&family=Roboto:wght@100;300;400;500;700;900&family=Style+Script&display=swap">
  <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
  </style>
</head>

<body>
  <div
    style="width: 600px; background-color: #f7f9fa; font-family: 'Roboto', sans-serif; color: #ffffff; line-height: 1.4; margin: 15px auto;">
    <table border="0"
      style="width: 600px; background-color: #141432; border-width: 10px; border-style: solid; border-image-slice: 1; border-image-source: linear-gradient(135deg, #5037CD, #FE88FF);">
      <tbody>
        <tr>
          <td style="padding: 16px;">
            <h1
              style="background: linear-gradient(135deg, #5037CD, #FE88FF); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 30px; text-align: center;">
              Satyam Casino</h1>
          </td>
        </tr>
        <tr>
          <td style="background-color: #2c2b69; padding: 24px;">
            <h1 style="color: #57D08A; font-size: 30px; text-align: center; margin-bottom: 32px;">Joining Bonus</h1>
            <div style="display: flex;">
              <p style="color: #ffffff; font-size: 16px; font-weight: 300; margin-left: 10px;">Congralutions
                {{userName}},<br> You have recieved Joining Bonus of Amount {{joiningAmount}}.</p>
            </div>
          </td>
        </tr>
        <tr>
          <td style="padding: 16px;">
            <p style="color: #605f9c; font-size: 12px; text-align: center;">@2023 {{{siteName}}}</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <title>Password Updated</title>
  <link rel="satylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Jura:wght@500&family=Roboto:wght@100;300;400;500;700;900&family=Style+Script&display=swap">
  <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
  </style>
</head>

<body>
  <table border="0"
    style="width: 600px; background-color: #0B195C; font-family: 'Roboto', sans-serif; color: #ffffff; line-height: 1.4; margin: 15px auto;">
    <tbody>
      <tr>
        <td style="padding: 20px;">
          <img src={{{siteLogo}}} style="width: 100px; display: block; margin: auto;" alt="img">
        </td>
      </tr>
      <tr>
        <td style="text-align: center;">
          <img
            src="https://gammastack-casino.s3.amazonaws.com/staging/superadmin_gallery_image_d3pybg91f84-1679659792626.jpeg"
            style="display: block; margin: auto;" alt="img">
        </td>
      </tr>
      <tr>
        <td style="text-align: center;">
          <div style="min-height: 280px; align-items: center; padding: 20px;">
            <h6
              style="font-size: 28px; font-weight: 900; letter-spacing: 1.5px; text-align: center; margin-bottom: 35px;">
              <span style="color: #ffffff; display: block;">Password Updated</span>
            </h6>
            <p style="color: #ffffff; font-size: 15px; font-weight: 400; letter-spacing: 1.5px; margin-bottom: 35px;">
              That’s okay, It happens. Click on the button below<br> to login.</p>
            <p style="color: #ffffff; font-size: 15px; font-weight: 400;">Email - <span
                style="color: #57D08A; font-weight: bold;">{{{playerEmail}}}</span></p>
            <p style="color: #ffffff; font-size: 15px; font-weight: 400; margin-bottom: 25px;">New Password - <span
                style="color: #57D08A; font-weight: bold;">{{{newPassword}}}</span></p>
            <a style="color: #ffffff;" target="_blank" href={{{siteLoginUrl}}}>
              <button type="button"
                style="min-width: 275px; background-color: transparent; border: 3px solid #ffffff; border-radius: 36px; color: #ffffff; font-size: 22px; font-weight: 700; letter-spacing: .5px; cursor: pointer; padding: 12px 30px;">
                Login</button></a>
          </div>
        </td>
      </tr>
      <tr>
        <td style="text-align: center; padding: 15px 20px 15px;">
          <p style="color: #ffffff; font-size: 15px; font-weight: 900; letter-spacing: .5px; text-align: center;">@2023
            {{{siteName}}}</p>
        </td>
      </tr>
    </tbody>
  </table>
</body>

</html>

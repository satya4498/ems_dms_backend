<!DOCTYPE html>
<html lang="en">

<head>
  <title>Withdrawal Approved</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Jura:wght@500&family=Roboto:wght@100;300;400;500;700;900&family=Style+Script&display=swap">
  <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
  </style>
</head>

<body>
  <table border="0"
    style="width: 600px; background-color: #0B195C; font-family: 'Roboto', sans-serif; color: #ffffff; line-height: 1.4; margin: 15px auto;">
    <tbody>
      <tr>
        <td style="padding: 20px;">
          <img src={{{siteLogo}}} style="width: 100px; display: block; margin: auto;" alt="img">
        </td>
      </tr>
      <tr>
        <td style="text-align: center;">
          <img
            src="https://gammastack-casino.s3.amazonaws.com/staging/site_2_gallery_image_fb0lqzz2ib-1679659385093.jpeg"
            style="display: block; margin: auto;" alt="img">
        </td>
      </tr>
      <tr>
        <td style="text-align: center;">
          <div style="min-height: 260px; margin-top: 40px; align-items: center; padding: 20px;">
            <h6
              style="font-size: 28px; font-weight: 900; letter-spacing: 1.5px; text-align: center; margin-bottom: 35px;">
              <span style="color: #68E752; display: block;">Withdraw Request Approved</span>
            </h6>
            <div style="color: #ffffff; text-align: center; padding-bottom: 10px; font-weight: bold;">Your withdraw
              request has been Approved, amount will be transferred to your bank account shortly.</div>
            <br>
            <h3 style="color: #ffffff; text-align: left; padding-bottom: 10px;">Approved Withdrawal Amount : <span
                style="color: #57D08A; font-weight: bold;">{{{playerCurrencySymbol}}} {{{withdrawAmount}}}</span></h3>
          </div>
        </td>
      </tr>
      <tr>
        <td style="text-align: center; padding: 15px 20px 15px;">
          <p style="color: #ffffff; font-size: 15px; font-weight: 900; letter-spacing: .5px; text-align: center;">@2023
            {{{siteName}}}</p>
        </td>
      </tr>
    </tbody>
  </table>
</body>

</html>
